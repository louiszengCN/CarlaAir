[build-system]
requires = ["setuptools", "wheel", "distro"]
build-backend = "setuptools.build_meta"

[project]
name = "carla-agents"
version = "0.1.0"
description = "CARLA autonomous driving agents with proper typing"
requires-python = ">=3.9"
dependencies = [
    "numpy>=1.24.0",
    "networkx>=3.0",
    "shapely>=2.0",
    "pydantic>=2.5",
    "typing-extensions>=4.8; python_version < '3.11'",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.15.0",
    "ty>=0.0.31",
    "mypy>=1.20.0",
]

[tool.ruff]
target-version = "py39"
line-length = 120
exclude = [
    ".git",
    "__pycache__",
    ".ruff_cache",
    "build",
    "dist",
    "*.egg-info",
    "PythonAPI/carla/source",      # Auto-generated C++ bindings
    "CarlaAir_Release",             # Binary distribution copy
    "LibCarla",                     # C++ library source
    "PythonAPI/docs/snipets",       # Documentation code snippets (upstream)
    "Build",                        # Build artifacts
]

[tool.ruff.lint]
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # pyflakes
    "I",     # isort
    "N",     # pep8-naming
    "UP",    # pyupgrade
    "B",     # flake8-bugbear
    "SIM",   # flake8-simplify
    "TCH",   # flake8-type-checking
    "RUF",   # ruff-specific rules
    "ANN",   # flake8-annotations
    "TID",   # flake8-tidy-imports
    "C4",    # flake8-comprehensions
    "RET",   # flake8-return
    "PL",    # pylint rules
    "FBT",   # flake8-boolean-trap
    "PERF",  # perflint
    "TRY",   # tryceratops
    "BLE",   # flake8-blind-except
    "A",     # flake8-builtins
    "COM",   # flake8-commas
    "DTZ",   # flake8-datetimez
    "ERA",   # eradicate
    "ICN",   # flake8-import-conventions
    "INP",   # flake8-no-pep420
    "PIE",   # flake8-pie
    "PT",    # flake8-pytest-style
    "Q",     # flake8-quotes
    "RSE",   # flake8-raise
    "SLOT",  # flake8-slots
    "T20",   # flake8-print (enforce logging over print)
]
ignore = []

[tool.ruff.lint.per-file-ignores]
# Upstream CARLA code: no type annotations, UE4 naming conventions, legacy style
"PythonAPI/examples/*" = ["ANN", "N", "FBT", "PLR", "PLW", "ERA001", "TRY", "BLE001", "RUF", "E501", "UP031", "PERF", "PLC0415", "PT", "B"]
"PythonAPI/util/*" = ["ANN", "N", "FBT", "PLR", "PLW", "ERA001", "TRY", "BLE001", "RUF", "E501", "UP031", "PERF", "PLC0415", "PT", "B"]
"PythonAPI/test/*" = ["ANN", "N", "FBT", "PLR", "PLW", "ERA001", "TRY", "BLE001", "RUF", "E501", "UP031", "PERF", "PLC0415", "PT", "B"]
"PythonAPI/docs/*" = ["ANN", "N", "FBT", "PLR", "PLW", "ERA001", "TRY", "BLE001", "RUF", "E501", "UP031", "PERF", "PLC0415", "PT", "B", "INP001"]
# scene_layout.py uses carla C++ extension objects which have no type stubs
"PythonAPI/carla/scene_layout.py" = ["ANN401"]
# global_route_planner has inherently branchy routing logic; refactoring would harm readability
"PythonAPI/carla/agents/navigation/global_route_planner.py" = ["PLR0912"]

[tool.ruff.lint.isort]
known-first-party = ["carla", "agents"]

[tool.ruff.lint.flake8-annotations]
mypy-init-return = true
suppress-dummy-args = true

[tool.ruff.lint.flake8-type-checking]
strict = true

[tool.ruff.lint.pylint]
max-args = 8
max-returns = 8
max-branches = 15
max-statements = 60

[tool.mypy]
python_version = "3.9"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
strict_equality = true
strict_optional = true

[[tool.mypy.overrides]]
module = ["carla", "shapely.*", "networkx.*"]
ignore_missing_imports = true

[tool.ty.environment]
python-version = "3.9"

[tool.typos]
# Ty type-checking configuration
strict = true
