name: Lint

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: |
          shellcheck -f gcc \
            build_carla_deps_macos.sh \
            carlaAir.sh \
            env_setup/setup_env.sh \
            PythonAPI/examples/ros2/run_rviz.sh
