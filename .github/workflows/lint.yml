name: Lint

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt-get install -y shellcheck
      - run: |
          shellcheck -f gcc \
            build_carla_deps_macos.sh \
            carlaAir.sh \
            env_setup/setup_env.sh \
            PythonAPI/examples/ros2/run_rviz.sh

  ruff:
    name: Ruff (Python lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/ruff-action@v4
        with:
          args: check --config PythonAPI/carla/pyproject.toml

  clang-format:
    name: clang-format (C++ style)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jidicula/clang-format-action@v4.18.0
        with:
          clang-format-version: '19'
          check-path: LibCarla/source
